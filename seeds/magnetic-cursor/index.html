<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁力光标 - Magnetic Cursor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../../index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span>返回集木区</span>
    </a>

    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="control-panel">
        <div class="panel-header">
            <h1 class="title">MAGNETIC</h1>
            <p class="subtitle">磁力光标系统</p>
        </div>

        <div class="controls">
            <div class="mode-switch">
                <button class="mode-btn active" data-mode="attract" id="btn-attract">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span>吸引</span>
                </button>
                <button class="mode-btn" data-mode="repel" id="btn-repel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M7 7l10 10M17 7L7 17"/>
                    </svg>
                    <span>排斥</span>
                </button>
            </div>

            <div class="sliders">
                <div class="slider-group">
                    <label>磁力强度</label>
                    <input type="range" min="0" max="100" value="50" id="force-slider">
                    <span class="value" id="force-value">50%</span>
                </div>
                <div class="slider-group">
                    <label>元素数量</label>
                    <input type="range" min="10" max="100" value="30" id="count-slider">
                    <span class="value" id="count-value">30</span>
                </div>
            </div>

            <div class="info-display">
                <div class="stat">
                    <span class="label">FPS</span>
                    <span class="value" id="fps-display">60</span>
                </div>
                <div class="stat">
                    <span class="label">元素</span>
                    <span class="value" id="element-display">30</span>
                </div>
            </div>
        </div>
    </div>

    <div class="cursor-glow"></div>

    <script src="main.js"></script>
</body>
</html>
