<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw AI 界面原型</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏：多角色控制面板 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" class="back-btn" title="返回聚合页">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
                </a>
                <h2>OpenClaw <span class="badge">MVP</span></h2>
            </div>

            <div class="roles-section">
                <h3 class="section-title">人格核心 (Agents)</h3>
                <ul class="role-list" id="role-list">
                    <!-- 角色将通过 JS 渲染 -->
                </ul>
            </div>

            <div class="prompt-section">
                <h3 class="section-title">系统指令 (System Prompt)</h3>
                <div class="prompt-editor">
                    <textarea id="system-prompt" spellcheck="false" placeholder="在此输入系统级底层指令..."></textarea>
                    <div class="editor-footer">
                        <span class="token-count">Token: <span id="token-val">0</span></span>
                        <button class="btn btn-primary btn-sm" id="btn-inject">注入指令</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧：对话主视窗 -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="current-role-info">
                    <div class="avatar" id="header-avatar">🤖</div>
                    <div>
                        <h2 id="header-name">默认助手</h2>
                        <span class="status-indicator">
                            <span class="dot"></span> 运行时就绪
                        </span>
                    </div>
                </div>
                <div class="model-selector">
                    <select class="styled-select" disabled>
                        <option>GLM-4 (模拟)</option>
                        <option>GPT-4o (模拟)</option>
                    </select>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- 消息将通过 JS 渲染 -->
                <div class="empty-state">
                    <div class="empty-icon">✨</div>
                    <p>等待唤醒...</p>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="输入消息 (Shift + Enter 换行)..." rows="1"></textarea>
                    <button class="btn btn-primary btn-send" id="btn-send">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span>基于 Web Worker 模拟网络延迟响应</span>
                </div>
            </div>
        </main>
    </div>

    <!-- 交互提示吐司 -->
    <div id="toast-container" class="toast-container"></div>

    <script src="main.js"></script>
</body>
</html>
